<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
<link rel="stylesheet" href="style.css">

<style>
.container {
  display: flex;
  flex-wrap: wrap;
  padding: 20px;
  gap: 20px;
}

/* LEFT IMAGE */
.left {
  flex: 1;
  min-width: 300px;
}

.left img {
  width: 100%;
  border-radius: 10px;
}

/* RIGHT DETAILS */
.right {
  flex: 2;
  min-width: 300px;
}

.price {
  color: green;
  font-size: 24px;
  margin: 10px 0;
}

.stars {
  color: gold;
  font-size: 20px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 200px;
  background: #ff9f00;
  border: none;
  cursor: pointer;
}

.review-box {
  margin-top: 20px;
}

textarea {
  width: 100%;
  height: 80px;
}

.result {
  margin-top: 10px;
  font-weight: bold;
}

/* Responsive */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🛒 E-Shop AI</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="admin.html">Admin</a>
  </div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img id="img">
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2 id="name"></h2>

    <div class="stars">⭐⭐⭐⭐☆</div>

    <div class="price">₹ <span id="price"></span></div>

    <p id="desc">Best quality product with amazing features.</p>

    <button onclick="addToCart()">🛒 Add to Cart</button>

    <!-- REVIEW -->
    <div class="review-box">
      <h3>Write Review</h3>

      <textarea id="review"></textarea>

      <button onclick="submitReview()">Submit Review</button>

      <div id="result" class="result"></div>
    </div>

  </div>

</div>

<script>
let product = JSON.parse(localStorage.getItem("product"));

// SET DATA
document.getElementById("name").innerText = product.name;
document.getElementById("img").src = product.img;

// random price (demo)
document.getElementById("price").innerText = Math.floor(Math.random()*5000 + 500);

// ADD TO CART
function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart!");
  <button onclick="buyNow()">⚡ Buy Now</button>
}

// REVIEW + ML
function submitReview(){
  let review = document.getElementById("review").value;

  if(review.trim() === ""){
    alert("Write review first!");
    return;
  }

  fetch("http://127.0.0.1:5000/predict",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      review: review,
      product: product.name
    })
  })
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("result").innerHTML =
      `LR:${data.lr} RF:${data.rf} XGB:${data.xgb}<br>
       <b>${data.final ? "Fake ❌":"Real ✅"}</b>`;
  });
}
function buyNow(){
  alert("Order placed successfully! 🎉");
}
</script>

</body>
</html>
